<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Tofu</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="blur-bg"></div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="game-ui">
        <div id="author-links">
            <a href="https://www.twitch.tv/susu3310" target="_blank" class="twitch-pic-link susu">
                <img src="./assets/susu.png" alt="Susu Twitch" class="author-pic">
            </a>
            <a href="https://www.twitch.tv/momohatofu" target="_blank" class="twitch-pic-link momo">
                <img src="./assets/tofu.png" alt="Momo Twitch" class="author-pic">
            </a>
        </div>
        
        <!-- 音量與設定按鈕 -->
        <div id="controls-container" style="display: flex; align-items: center; gap: 10px;">
            <div id="volume-control" style="display: flex; align-items: center; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; color: white;">
                <label for="bgm-volume" style="margin-right: 5px; font-size: 14px;">音量</label>
                <input type="range" id="bgm-volume" min="0" max="1" step="0.05" value="0.5" style="width: 300px;">
            </div>
            <button id="settings-btn">設定參數</button>
        </div>
    </div>

    <!-- 設定懸浮窗 -->
    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2>自訂參數</h2>
            <div id="settings-form"></div>
            <div class="modal-actions">
                <button id="save-settings-btn">儲存套用</button>
                <button id="reset-settings-btn">回復預設</button>
                <button id="close-settings-btn">關閉</button>
            </div>
        </div>
    </div>

    <audio id="bgm" src="./assets/dancing in the sky.mp4" loop preload="auto"></audio>

    <script src="game.js"></script>
    <script src="main.js"></script>
</body>
</html>
